<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton [mat-dialog-close]="false">{{ data.cancelText }}</button>
  <button
    mat-raised-button
    [color]="data.color"
    [mat-dialog-close]="true"
    cdkFocusInitial>
    {{ data.confirmText }}
  </button>
</mat-dialog-actions>
