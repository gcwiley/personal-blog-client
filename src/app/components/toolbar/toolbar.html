<div class="toolbar-container">
  <div class="toolbar-content">
    <button mat-flat-button type="button" routerLink="/posts/create">
      <mat-icon>add</mat-icon>
      Create Post
    </button>

    <!-- post count -->
    @if (postCount$ | async; as count) {
    <span class="post-count">{{ count }} posts</span>
    }

    <!-- search -->
    <mat-form-field
      class="search-field"
      appearance="outline"
      subscriptSizing="dynamic">
      <mat-icon matPrefix>search</mat-icon>
      <input
        matInput
        type="search"
        placeholder="Search posts..."
        [value]="searchQuery()"
        (input)="onSearch($any($event.target).value)"
        aria-label="Search posts" />
      @if (searchQuery()) {
      <button
        matSuffix
        mat-icon-button
        (click)="clearSearch()"
        aria-label="Clear search">
        <mat-icon>close</mat-icon>
      </button>
      }
    </mat-form-field>

    <span class="flex-spacer"></span>

    <!-- toggle sort -->
    <mat-button-toggle-group [(value)]="sortOrder" aria-label="Sort order">
      <mat-button-toggle
        value="desc"
        matTooltip="Newest first"
        aria-label="Newest first">
        <mat-icon>arrow_downward</mat-icon>
      </mat-button-toggle>
      <mat-button-toggle
        value="asc"
        matTooltip="Oldest first"
        aria-label="Oldest first">
        <mat-icon>arrow_upward</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>

    <!-- toggle view -->
    <mat-button-toggle-group [(value)]="viewMode" aria-label="Select view mode">
      <mat-button-toggle
        value="grid"
        aria-label="Grid View"
        matTooltip="Grid View">
        <mat-icon>grid_view</mat-icon>
      </mat-button-toggle>
      <mat-button-toggle
        value="table"
        aria-label="Table View"
        matTooltip="Table View">
        <mat-icon>table_rows</mat-icon>
      </mat-button-toggle>
    </mat-button-toggle-group>

    <!-- toggle theme -->
    <button
      mat-icon-button
      type="button"
      (click)="toggleTheme()"
      [matTooltip]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
      aria-label="Toggle theme">
      <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
  </div>
</div>
